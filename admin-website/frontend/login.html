<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Ordinate</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="icon" type="image/svg+xml" href="assets/images/logo.svg">
</head>
<body class="admin-login-page">
    <div class="login-card">
        <div class="login-logo">
            <img src="assets/images/logo.svg" alt="Ordinate Logo">
        </div>

        <h2>Welcome back</h2>
        <p class="login-subtitle">Sign in to manage your job portal</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-control" value="admin" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>

            <div id="loginAlert" class="alert alert-hidden"></div>

            <button type="submit" class="btn btn-primary btn-full mt-8">Sign In</button>
        </form>

        <p class="text-center mt-24 text-muted" style="font-size: 0.82rem;">
            Secure area. Authorized personnel only.
        </p>
    </div>

    <script src="api.js"></script>
    <script src="admin-login.js"></script>
</body>
</html>
