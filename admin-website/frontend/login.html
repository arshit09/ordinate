<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Ordinate</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="icon" type="image/svg+xml" href="assets/images/logo.svg">
</head>
<body class="admin-login-page">
    <div class="login-card">
        <div class="login-logo">
            <img src="assets/images/logo.svg" alt="Ordinate Logo">
        </div>

        <div class="step-indicator">
            <div id="step-1" class="step-dot active"></div>
            <div id="step-2" class="step-dot"></div>
        </div>

        <h2>Welcome back</h2>
        <p class="login-subtitle">Sign in to manage your job portal</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-control" value="admin" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>

            <div id="loginAlert" class="alert alert-hidden"></div>

            <button type="submit" class="btn btn-primary btn-full mt-8">Continue</button>
        </form>

        <form id="totpForm" class="alert-hidden">
            <p class="text-center mb-24 text-muted">Enter the 6-digit code from your authenticator app.</p>
            
            <div class="totp-input-group">
                <input type="text" class="totp-digit" maxlength="1" pattern="\d" inputmode="numeric">
                <input type="text" class="totp-digit" maxlength="1" pattern="\d" inputmode="numeric">
                <input type="text" class="totp-digit" maxlength="1" pattern="\d" inputmode="numeric">
                <input type="text" class="totp-digit" maxlength="1" pattern="\d" inputmode="numeric">
                <input type="text" class="totp-digit" maxlength="1" pattern="\d" inputmode="numeric">
                <input type="text" class="totp-digit" maxlength="1" pattern="\d" inputmode="numeric">
            </div>

            <div id="totpAlert" class="alert alert-hidden mt-24"></div>

            <button type="submit" class="btn btn-primary btn-full mt-24">Verify & Sign In</button>
            
            <button type="button" id="backToLogin" class="btn btn-ghost btn-full mt-16 btn-sm">
                Back to credentials
            </button>
        </form>

        <p class="text-center mt-24 text-muted" style="font-size: 0.82rem;">
            Secure area. Authorized personnel only.
        </p>
    </div>

    <script src="api.js"></script>
    <script src="admin-login.js"></script>
</body>
</html>
